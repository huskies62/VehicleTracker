<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Milepost</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="theme-color" content="#12151A" />
<style>
  :root {
    --bg:#12151A; --surface:#171B1F; --surface2:#1B1F24; --surface3:#1F242A;
    --border:#262B31; --border2:#2C3238; --text:#ECE9E2; --dim:#8B929B;
    --amber:#E3A23D; --teal:#6FAF9C; --terra:#C1735A; --danger:#CC6B6B;
    --display: system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:var(--display); -webkit-tap-highlight-color:transparent; }
  button, input, textarea { font-family: inherit; }
  input:focus, textarea:focus { outline:2px solid var(--amber); outline-offset:1px; }
  button:focus-visible { outline:2px solid var(--amber); outline-offset:2px; }
  button { cursor:pointer; }
  #app { min-height:100vh; display:flex; flex-direction:column; padding-bottom: env(safe-area-inset-bottom); }
  .header { background:var(--surface); border-bottom:1px solid var(--border); padding:14px 16px; }
  .header-row { display:flex; justify-content:space-between; align-items:center; }
  .brand { font-weight:800; font-size:18px; letter-spacing:0.04em; }
  .icon-btn { background:none; border:none; padding:6px; display:flex; }
  .vehicle-btn { margin-top:12px; width:100%; display:flex; align-items:center; gap:10px; background:var(--surface3); border:1px solid var(--border2); border-radius:10px; padding:10px 12px; color:var(--text); }
  .avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .tabs { display:flex; border-bottom:1px solid var(--border); }
  .tab { flex:1; padding:12px 0; background:none; border:none; border-bottom:2px solid transparent; color:var(--dim); font-family:var(--display); font-size:12.5px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
  .tab.active { color:var(--text); border-bottom-color:var(--amber); }
  .body { flex:1; overflow-y:auto; padding:16px 16px 100px; }
  .odo-card { background:var(--surface2); border:1px solid var(--border); border-radius:14px; padding:18px; display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:6px; }
  .odo-label { font-size:11px; color:var(--dim); letter-spacing:0.1em; text-transform:uppercase; }
  .odo-digits { display:flex; gap:3px; }
  .odo-digit { width:26px; height:36px; background:#0E1013; border:1px solid #33393f; border-radius:3px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-size:22px; font-weight:600; color:var(--amber); box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
  .section-label { display:flex; align-items:center; gap:8px; margin:22px 0 4px; }
  .section-label .dot { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
  .section-label span.txt { font-family:var(--display); font-size:12px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; }
  .stat-row { display:flex; justify-content:space-between; align-items:baseline; padding:11px 0; border-bottom:1px solid #23282e; }
  .stat-row .lbl { color:var(--dim); font-size:14px; }
  .stat-row .val { font-family:var(--mono); font-size:15px; font-weight:600; }
  .stat-row .unit { color:var(--dim); font-weight:400; font-size:12px; }
  .entry-row { width:100%; display:flex; align-items:center; gap:12px; padding:12px 4px; border-bottom:1px solid #23282e; background:none; border-left:none; border-right:none; border-top:none; text-align:left; color:var(--text); }
  .entry-icon { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .entry-main { flex:1; min-width:0; }
  .entry-date { font-size:14.5px; font-weight:600; }
  .entry-sub { color:var(--dim); font-size:12.5px; font-family:var(--mono); display:flex; align-items:center; gap:6px; }
  .badge-partial { background:#3A2F1A; color:var(--amber); font-size:10.5px; font-weight:700; padding:1px 6px; border-radius:5px; }
  .entry-cost { font-family:var(--mono); font-weight:700; font-size:14.5px; }
  .empty { text-align:center; color:var(--dim); padding:60px 20px; font-size:14.5px; line-height:1.6; }
  .fab { position:fixed; bottom:24px; right:20px; width:56px; height:56px; border-radius:50%; background:var(--amber); border:none; box-shadow:0 4px 14px rgba(0,0,0,0.4); display:flex; align-items:center; justify-content:center; }
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:flex-end; z-index:50; }
  .modal-sheet { background:var(--surface); width:100%; max-height:86vh; border-radius:18px 18px 0 0; padding:18px 18px calc(28px + env(safe-area-inset-bottom)); overflow-y:auto; border:1px solid var(--border); border-bottom:none; }
  .modal-title-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .modal-title { font-family:var(--display); font-weight:700; font-size:15px; letter-spacing:0.05em; text-transform:uppercase; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:12px; color:var(--dim); margin-bottom:5px; font-weight:600; }
  .input, textarea.input { width:100%; background:var(--surface3); border:1px solid var(--border2); border-radius:9px; padding:11px 12px; color:var(--text); font-size:15px; font-family:var(--mono); }
  .btn-primary { background:var(--amber); border:none; border-radius:10px; padding:13px 0; color:var(--bg); font-weight:700; font-size:15px; }
  .btn-secondary { background:none; border:1px solid var(--border2); border-radius:10px; padding:13px 18px; color:var(--text); font-weight:700; font-size:15px; }
  .type-tabs { display:flex; gap:8px; margin-bottom:16px; }
  .type-tab { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 0; border-radius:10px; border:1.5px solid var(--border); background:none; color:var(--dim); font-size:12px; font-weight:600; }
  .type-tab.active { color:var(--text); }
  .checkbox-row { display:flex; align-items:center; gap:10px; width:100%; background:var(--surface3); border:1px solid var(--border2); border-radius:9px; padding:11px 12px; margin-bottom:12px; color:var(--text); }
  .checkbox-box { width:20px; height:20px; border-radius:5px; flex-shrink:0; border:1.5px solid #4a5058; display:flex; align-items:center; justify-content:center; }
  .checkbox-box.checked { border:none; background:var(--amber); color:var(--bg); font-weight:800; font-size:13px; }
  .row-flex { display:flex; gap:10px; align-items:center; }
  .drop-zone { display:flex; align-items:center; justify-content:center; gap:8px; border:1.5px dashed var(--border2); border-radius:10px; padding:16px; margin-bottom:12px; color:var(--dim); font-size:14px; }
  .err-banner { background:#3A2323; color:#E3A5A5; padding:10px 16px; font-size:13px; }
  .ok-text { color:var(--teal); font-size:13px; margin-top:10px; }
  .bad-text { color:var(--danger); font-size:13px; margin-top:10px; }
  .center-loading { display:flex; align-items:center; justify-content:center; min-height:100vh; color:var(--dim); font-family:var(--mono); }
  .list-item { display:flex; align-items:center; gap:12px; padding:10px 4px; border-bottom:1px solid #23282e; }
  .vpick-row { width:100%; display:flex; align-items:center; gap:12px; padding:12px 6px; background:none; border:none; border-radius:10px; margin-bottom:4px; color:var(--text); }
  .vpick-row.active { background:var(--surface3); }
  svg.ic { display:block; }
</style>
</head>
<body>
<div id="app"><div class="center-loading">Loading ledger…</div></div>
<script>
// ---------------- icons (tiny inline SVGs, no external deps) ----------------
const ICONS = {
  fuel: (c,s=17)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="15" y2="22"/><line x1="4" y1="9" x2="14" y2="9"/><path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"/><path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2 2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"/></svg>`,
  wrench: (c,s=17)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
  dollar: (c,s=17)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
  plus: (c,s=26)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  x: (c,s=20)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  chevron: (c,s=16)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`,
  trash: (c,s=17)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>`,
  car: (c,s=16)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M5 17a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm14 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0zM5 17V9l2-5h10l2 5v8"/></svg>`,
  gear: (c,s=19)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
  gauge: (c,s=14)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M12 3a9 9 0 0 0-9 9c0 2 .6 3.9 1.7 5.4M12 3a9 9 0 0 1 9 9c0 2-.6 3.9-1.7 5.4"/><path d="M14 12l3-3"/></svg>`,
  upload: (c,s=16)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
  download: (c,s=19)=>`<svg class="ic" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
};
const VEHICLE_COLORS = ["#4FB6A6", "#E0A64D", "#9B7EBD", "#6C93C7", "#C1735A", "#7FA65C"];
const TYPE_META = {
  fuel: { label: "Fuel", icon: ICONS.fuel, color: "#E3A23D" },
  service: { label: "Service", icon: ICONS.wrench, color: "#6FAF9C" },
  other: { label: "Other", icon: ICONS.dollar, color: "#C1735A" },
};
const uid = () => Math.random().toString(36).slice(2, 10);
const money = (n) => (Number.isFinite(n) ? n.toFixed(2) : "0.00");
const num = (n, d = 1) => (Number.isFinite(n) ? n.toFixed(d) : "—");
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));

function normalizeDate(raw) {
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  return d.toISOString().slice(0, 10);
}

function parseDelimited(text) {
  const firstLine = text.split(/\r?\n/, 1)[0] || "";
  const delim = (firstLine.match(/\t/g) || []).length > (firstLine.match(/,/g) || []).length ? "\t" : ",";
  const rows = [];
  let row = [], field = "", inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i + 1] === '"') { field += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else field += c;
    } else {
      if (c === '"') inQuotes = true;
      else if (c === delim) { row.push(field); field = ""; }
      else if (c === "\n" || c === "\r") {
        if (c === "\r" && text[i + 1] === "\n") i++;
        row.push(field); field = "";
        if (row.some((f) => f !== "")) rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field !== "" || row.length) { row.push(field); rows.push(row); }
  if (rows.length === 0) return [];
  const header = rows[0].map((h) => h.trim().toLowerCase());
  const idx = (...aliases) => header.findIndex((h) => aliases.some((a) => h === a || h.includes(a)));
  const vI = idx("vehicle"), dI = idx("date"),
    tI = idx("record type", "type"),
    oI = idx("odometer"),
    lI = idx("litres", "liters", "qty", "quantity"),
    cI = idx("total cost", "cost", "amount"),
    fI = idx("full tank"),
    nI = idx("record desc", "note", "notes", "description");
  return rows.slice(1).map((r) => {
    const typeRaw = (tI >= 0 ? r[tI] : "").trim().toLowerCase();
    const type = typeRaw.includes("fuel") ? "fuel" : typeRaw.includes("service") ? "service" : typeRaw.includes("other") || typeRaw.includes("expense") ? "other" : "fuel";
    const fullRaw = (fI >= 0 ? r[fI] : "").trim().toLowerCase();
    const fullTank = fI < 0 ? true : !["no","n","false","0","partial"].includes(fullRaw);
    return {
      vehicleName: (vI >= 0 ? r[vI] : "").trim(),
      date: (dI >= 0 ? r[dI] : "").trim(),
      type,
      odometer: oI >= 0 && r[oI] !== "" ? parseFloat(r[oI]) : undefined,
      liters: lI >= 0 && r[lI] !== "" ? parseFloat(r[lI]) : undefined,
      cost: cI >= 0 && r[cI] !== "" ? parseFloat(r[cI]) : undefined,
      fullTank,
      note: nI >= 0 ? r[nI].trim() : undefined,
    };
  }).filter((r) => r.date && r.vehicleName);
}

// ---------------- state ----------------
let API_URL = localStorage.getItem("milepost_api_url") || "";
let vehicles = [], entries = [];
let activeVehicleId = null;
let view = "dashboard";
let loading = true;
let errorMsg = "";
let modal = null;
let saving = false;

async function apiGet() {
  const res = await fetch(API_URL + (API_URL.includes("?") ? "&" : "?") + "action=getAll");
  if (!res.ok) throw new Error("network");
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(API_URL, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error("network");
  return res.json();
}

async function init() {
  if (!API_URL) { loading = false; modal = { type: "setup" }; render(); return; }
  try {
    const data = await apiGet();
    vehicles = data.vehicles || [];
    entries = data.entries || [];
    if (vehicles.length === 0) {
      vehicles = [{ id: uid(), name: "Ford F-150", color: VEHICLE_COLORS[0] }, { id: uid(), name: "Honda Civic", color: VEHICLE_COLORS[1] }];
      await apiPost({ action: "saveVehicles", vehicles });
    }
    activeVehicleId = vehicles[0]?.id ?? null;
  } catch (err) {
    errorMsg = "Couldn't reach your Google Sheet. Check the setup URL in settings.";
  }
  loading = false;
  render();
}

async function persistVehicles(next) {
  vehicles = next;
  try { await apiPost({ action: "saveVehicles", vehicles }); }
  catch { errorMsg = "Couldn't save vehicle changes — check your connection."; }
}
async function persistEntries(next) {
  entries = next;
  try { await apiPost({ action: "saveEntries", entries }); }
  catch { errorMsg = "Couldn't save your entry — check your connection."; }
}

function activeVehicle() { return vehicles.find((v) => v.id === activeVehicleId) || null; }
function vehicleEntries() {
  return entries.filter((e) => e.vehicleId === activeVehicleId).sort((a, b) => new Date(b.date) - new Date(a.date));
}

function computeStats(es) {
  if (es.length === 0) return null;
  const withOdo = es.filter((e) => Number.isFinite(e.odometer));
  const odos = withOdo.map((e) => e.odometer);
  const distance = odos.length > 1 ? Math.max(...odos) - Math.min(...odos) : 0;
  const dates = es.map((e) => new Date(e.date).getTime()).filter((t) => !isNaN(t));
  const daysSpan = dates.length > 1 ? (Math.max(...dates) - Math.min(...dates)) / 86400000 : 0;
  const monthsSpan = daysSpan / 30.44;
  const fuel = es.filter((e) => e.type === "fuel");
  const service = es.filter((e) => e.type === "service");
  const other = es.filter((e) => e.type === "other");
  const fuelQty = fuel.reduce((s, e) => s + (Number(e.liters) || 0), 0);
  const fuelCost = fuel.reduce((s, e) => s + (Number(e.cost) || 0), 0);
  const serviceCost = service.reduce((s, e) => s + (Number(e.cost) || 0), 0);
  const otherCost = other.reduce((s, e) => s + (Number(e.cost) || 0), 0);
  const totalCost = fuelCost + serviceCost + otherCost;
  return {
    distance, fillUps: fuel.length, fuelQty, fuelCost, serviceCost, otherCost, totalCost,
    costPerKm: distance ? totalCost / distance : NaN,
    avgFuelEff: distance ? (fuelQty / distance) * 100 : NaN,
    distBtwFillups: fuel.length > 1 ? distance / (fuel.length - 1) : NaN,
    qtyPerFillup: fuel.length ? fuelQty / fuel.length : NaN,
    costPerFillup: fuel.length ? fuelCost / fuel.length : NaN,
    avgPricePerLtr: fuelQty ? fuelCost / fuelQty : NaN,
    fillUpsPerMonth: monthsSpan ? fuel.length / monthsSpan : NaN,
    fuelCostPerKm: distance ? fuelCost / distance : NaN,
    fuelCostPerDay: daysSpan ? fuelCost / daysSpan : NaN,
    fuelCostPerMonth: monthsSpan ? fuelCost / monthsSpan : NaN,
  };
}

// ---------------- render ----------------
function render() {
  const app = document.getElementById("app");
  if (loading) { app.innerHTML = `<div class="center-loading">Loading ledger…</div>`; return; }

  const v = activeVehicle();
  const es = vehicleEntries();
  const stats = computeStats(es);

  app.innerHTML = `
    <div class="header">
      <div class="header-row">
        <div class="brand">MILEPOST</div>
        <div style="display:flex;gap:4px;">
          <button class="icon-btn" data-act="import">${ICONS.upload("#8B929B")}</button>
          <button class="icon-btn" data-act="export">${ICONS.download("#8B929B")}</button>
          <button class="icon-btn" data-act="manage">${ICONS.gear("#8B929B")}</button>
        </div>
      </div>
      <button class="vehicle-btn" data-act="pick-vehicle">
        <div class="avatar" style="background:${(v?.color || "#555")}33">${ICONS.car(v?.color || "#8B929B")}</div>
        <span style="flex:1;text-align:left;font-weight:600;font-size:15px;">${v ? esc(v.name) : "Add a vehicle"}</span>
        ${ICONS.chevron("#8B929B")}
      </button>
    </div>
    <div class="tabs">
      <button class="tab ${view === "dashboard" ? "active" : ""}" data-act="view-dashboard">Dashboard</button>
      <button class="tab ${view === "log" ? "active" : ""}" data-act="view-log">Log</button>
    </div>
    ${errorMsg ? `<div class="err-banner">${esc(errorMsg)}</div>` : ""}
    <div class="body">
      ${!v ? `<div class="empty">Add a vehicle to start logging.</div>` : renderBody(v, es, stats)}
    </div>
    ${v ? `<button class="fab" data-act="add-entry">${ICONS.plus("#12151A")}</button>` : ""}
  `;

  if (modal) renderModal();
  bindEvents();
}

function renderBody(v, es, stats) {
  if (view === "dashboard") return renderDashboard(v, es, stats);
  return renderLog(es);
}

function renderDashboard(v, es, stats) {
  if (!stats) return `<div class="empty">No entries yet for ${esc(v.name)}. Tap + to log a fill-up.</div>`;
  const digits = String(Math.max(0, Math.round(stats.distance))).padStart(6, "0").slice(-6);
  return `
    <div class="odo-card">
      <span class="odo-label">Total Distance</span>
      <div class="odo-digits">${digits.split("").map((ch) => `<div class="odo-digit">${ch}</div>`).join("")}</div>
      <span style="font-size:11px;color:var(--dim);">km</span>
    </div>
    ${sectionLabel(ICONS.gauge, "#E3A23D", "Total Stats")}
    ${statRow("Fill-ups", stats.fillUps)}
    ${statRow("Fuel Qty", num(stats.fuelQty, 2), "L")}
    ${statRow("Fuel Cost", money(stats.fuelCost), "CAD")}
    ${statRow("Service Cost", money(stats.serviceCost), "CAD")}
    ${statRow("Other Expenses", money(stats.otherCost), "CAD")}
    ${statRow("Total Cost", money(stats.totalCost), "CAD")}
    ${statRow("Total Cost/km", num(stats.costPerKm, 2), "CAD")}
    ${sectionLabel(ICONS.fuel, "#E3A23D", "Average Fuel Stats")}
    ${statRow("Avg Fuel Eff", num(stats.avgFuelEff, 2), "L/100km")}
    ${statRow("Dist Btwn Fill-Ups", num(stats.distBtwFillups, 1), "km")}
    ${statRow("Qty Per Fill-Up", num(stats.qtyPerFillup, 2), "L")}
    ${statRow("Cost Per Fill-Up", money(stats.costPerFillup), "CAD")}
    ${statRow("Avg Price/Ltr", num(stats.avgPricePerLtr, 3), "CAD")}
    ${statRow("Fill-Ups Per Mth", num(stats.fillUpsPerMonth, 2))}
    ${statRow("Fuel Cost/km", num(stats.fuelCostPerKm, 2), "CAD")}
    ${statRow("Fuel Cost/Day", money(stats.fuelCostPerDay), "CAD")}
    ${statRow("Fuel Cost/Mth", money(stats.fuelCostPerMonth), "CAD")}
    <div class="section-label"><span class="txt">Recent Entries</span></div>
    ${es.slice(0, 5).map(entryRow).join("") || `<div class="empty">No entries yet.</div>`}
  `;
}

function renderLog(es) {
  if (es.length === 0) return `<div class="empty">No entries yet. Tap + to log a fill-up, service, or expense.</div>`;
  return es.map(entryRow).join("");
}

function sectionLabel(iconFn, color, text) {
  return `<div class="section-label"><div class="dot" style="background:${color}22">${iconFn(color)}</div><span class="txt">${text}</span></div>`;
}
function statRow(label, value, unit) {
  return `<div class="stat-row"><span class="lbl">${label}</span><span class="val">${value}${unit ? ` <span class="unit">${unit}</span>` : ""}</span></div>`;
}
function entryRow(e) {
  const meta = TYPE_META[e.type] || TYPE_META.other;
  const dateStr = new Date(e.date + "T00:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  const sub = `${Number.isFinite(e.odometer) ? `Odo: ${e.odometer}` : meta.label}${e.type === "fuel" && Number.isFinite(e.liters) ? ` · ${e.liters}L` : ""}`;
  return `
    <button class="entry-row" data-act="edit-entry" data-id="${e.id}">
      <div class="entry-icon" style="background:${meta.color}22">${meta.icon(meta.color)}</div>
      <div class="entry-main">
        <div class="entry-date">${dateStr}</div>
        <div class="entry-sub"><span>${esc(sub)}</span>${e.type === "fuel" && e.fullTank === false ? `<span class="badge-partial">PARTIAL</span>` : ""}</div>
      </div>
      <div class="entry-cost">${e.cost ? `$${money(Number(e.cost))}` : ""}</div>
    </button>
  `;
}

// ---------------- modals ----------------
function modalShell(title, bodyHtml) {
  return `
    <div class="modal-backdrop" data-act="close-modal">
      <div class="modal-sheet" data-stop="1">
        <div class="modal-title-row">
          <span class="modal-title">${title}</span>
          <button class="icon-btn" data-act="close-modal">${ICONS.x("#8B929B")}</button>
        </div>
        ${bodyHtml}
      </div>
    </div>
  `;
}

function renderModal() {
  let html = "";
  if (modal.type === "setup") {
    html = modalShell("Connect Your Sheet", `
      <p style="font-size:13px;color:var(--dim);line-height:1.6;margin-top:0;">
        Paste the Web App URL from your Google Apps Script deployment (see SETUP.md). This is where your data lives.
      </p>
      <div class="field"><label>Apps Script Web App URL</label><input class="input" id="setup-url" placeholder="https://script.google.com/macros/s/.../exec" /></div>
      <button class="btn-primary" style="width:100%;" data-act="save-setup">Connect</button>
    `);
  } else if (modal.type === "vehiclePicker") {
    html = modalShell("Switch Vehicle", vehicles.map((v) => `
      <button class="vpick-row ${v.id === activeVehicleId ? "active" : ""}" data-act="select-vehicle" data-id="${v.id}">
        <div class="avatar" style="background:${v.color}33">${ICONS.car(v.color, 15)}</div>
        <span style="font-size:15px;font-weight:600;">${esc(v.name)}</span>
      </button>
    `).join(""));
  } else if (modal.type === "vehicleManage") {
    html = modalShell("Manage Vehicles", `
      ${vehicles.map((v) => `
        <div class="list-item">
          <div style="width:26px;height:26px;border-radius:50%;background:${v.color}"></div>
          <span style="flex:1;font-size:14.5px;">${esc(v.name)}</span>
          ${modal.confirmDeleteId === v.id ? `
            <span style="font-size:12px;color:var(--danger);">Delete + all entries?</span>
            <button data-act="confirm-delete-vehicle" data-id="${v.id}" style="background:var(--danger);border:none;border-radius:7px;padding:6px 10px;color:var(--bg);font-weight:700;font-size:12.5px;">Yes</button>
            <button data-act="cancel-delete-vehicle" style="background:none;border:1px solid var(--border2);border-radius:7px;padding:6px 10px;color:var(--dim);font-size:12.5px;">Cancel</button>
          ` : `<button class="icon-btn" data-act="ask-delete-vehicle" data-id="${v.id}">${ICONS.trash("#CC6B6B")}</button>`}
        </div>
      `).join("")}
      <div class="row-flex" style="margin-top:16px;">
        <input class="input" id="new-vehicle-name" placeholder="e.g. Toyota Corolla" style="flex:1;" />
        <button class="btn-primary" style="padding:0 18px;" data-act="add-vehicle">Add</button>
      </div>
      <div style="margin-top:18px;border-top:1px solid var(--border);padding-top:14px;">
        <span style="font-size:12px;color:var(--dim);">Sheet connection</span>
        <div class="row-flex" style="margin-top:8px;">
          <input class="input" id="edit-api-url" value="${esc(API_URL)}" style="flex:1;font-size:12.5px;" />
          <button class="btn-secondary" data-act="save-api-url">Save</button>
        </div>
      </div>
    `);
  } else if (modal.type === "import") {
    const rows = modal.rows;
    html = modalShell("Import CSV", `
      <p style="font-size:13px;color:var(--dim);line-height:1.6;margin-top:0;">
        Expected columns: <strong style="color:var(--text);">Vehicle, Date, Type, Odometer, Liters, Cost, Note</strong>. New vehicle names are created automatically.
      </p>
      <label class="drop-zone">
        ${ICONS.upload("#8B929B")}<span>Choose CSV file</span>
        <input type="file" accept=".csv,text/csv" style="display:none" id="import-file" />
      </label>
      <div style="font-size:12px;color:var(--dim);text-align:center;margin:4px 0 10px;">— or select cells in Sheets, copy, and paste below —</div>
      <textarea class="input" id="import-text" rows="5" placeholder="Vehicle,Date,Type,Odometer,Liters,Cost,Note" style="resize:vertical;font-size:13px;">${esc(modal.text || "")}</textarea>
      ${modal.status ? `<div class="${rows && rows.length ? "ok-text" : "bad-text"}">${esc(modal.status)}</div>` : ""}
      ${rows && rows.length > 0 && !(modal.status||"").startsWith("Imported") ? `<div class="ok-text">${rows.length} rows ready to import.</div>` : ""}
      <div class="row-flex" style="margin-top:16px;">
        <button class="btn-secondary" style="flex:1;" data-act="preview-import">Preview</button>
        <button class="btn-primary" style="flex:1;${!rows || rows.length === 0 ? "opacity:0.5;" : ""}" data-act="confirm-import" ${!rows || rows.length === 0 ? "disabled" : ""}>${modal.importing ? "Importing…" : "Import"}</button>
      </div>
    `);
  } else if (modal.type === "entry") {
    const en = modal.entry;
    const isNew = !en.id;
    const pricePerL = en._liters && en._cost ? (parseFloat(en._cost) / parseFloat(en._liters)) : null;
    html = modalShell(isNew ? "New Entry" : "Edit Entry", `
      <div class="type-tabs">
        ${Object.entries(TYPE_META).map(([key, meta]) => `
          <button class="type-tab ${en._type === key ? "active" : ""}" data-act="set-entry-type" data-type="${key}" style="${en._type === key ? `border-color:${meta.color};background:${meta.color}1a;` : ""}">
            ${meta.icon(en._type === key ? meta.color : "#8B929B", 18)}<span style="${en._type === key ? `color:${meta.color};` : ""}">${meta.label}</span>
          </button>
        `).join("")}
      </div>
      <div class="field"><label>Date</label><input class="input" type="date" id="entry-date" value="${esc(en._date || "")}" /></div>
      <div class="field"><label>Odometer (km)</label><input class="input" type="number" inputmode="decimal" id="entry-odo" value="${esc(en._odometer ?? "")}" placeholder="e.g. 134323" /></div>
      ${en._type === "fuel" ? `<div class="field"><label>Fuel Quantity (L)</label><input class="input" type="number" inputmode="decimal" id="entry-liters" value="${esc(en._liters ?? "")}" placeholder="e.g. 45.5" /></div>` : ""}
      <div class="field"><label>Cost (CAD)</label><input class="input" type="number" inputmode="decimal" id="entry-cost" value="${esc(en._cost ?? "")}" placeholder="e.g. 62.30" /></div>
      ${en._type === "fuel" && pricePerL ? `<div style="font-size:13px;color:var(--dim);margin-bottom:10px;font-family:var(--mono);">≈ $${pricePerL.toFixed(3)} / L</div>` : ""}
      ${en._type === "fuel" ? `
        <button class="checkbox-row" data-act="toggle-fulltank">
          <div class="checkbox-box ${en._fullTank ? "checked" : ""}">${en._fullTank ? "✓" : ""}</div>
          <span style="font-size:14.5px;">Full tank</span>
          <span style="color:var(--dim);font-size:12px;margin-left:auto;">${en._fullTank ? "Full fill-up" : "Partial fill-up"}</span>
        </button>
      ` : `<div class="field"><label>Note</label><input class="input" id="entry-note" value="${esc(en._note || "")}" placeholder="e.g. Oil change, parking, wash" /></div>`}
      <div class="row-flex" style="margin-top:18px;">
        ${!isNew ? (modal.confirmDelete ? `
          <button class="btn-secondary" style="background:var(--danger);border-color:var(--danger);color:var(--bg);" data-act="confirm-delete-entry">Confirm Delete</button>
          <button class="btn-secondary" data-act="cancel-delete-entry">Cancel</button>
        ` : `<button class="btn-secondary" style="color:var(--danger);border-color:#4a2c2c;" data-act="ask-delete-entry">Delete</button>`) : ""}
        ${!modal.confirmDelete ? `<button class="btn-primary" style="flex:1;" data-act="save-entry" ${saving ? "disabled" : ""}>${saving ? "Saving…" : "Save Entry"}</button>` : ""}
      </div>
    `);
  }
  document.getElementById("app").insertAdjacentHTML("beforeend", html);
}

// ---------------- events ----------------
function bindEvents() {
  const app = document.getElementById("app");
  app.onclick = async (e) => {
    const t = e.target.closest("[data-act]");
    if (!t) {
      if (e.target.closest("[data-stop]") === null && e.target.classList.contains("modal-backdrop")) closeModal();
      return;
    }
    const act = t.dataset.act;

    if (act === "close-modal") { closeModal(); return; }
    if (act === "view-dashboard") { view = "dashboard"; render(); return; }
    if (act === "view-log") { view = "log"; render(); return; }
    if (act === "pick-vehicle") { modal = { type: "vehiclePicker" }; render(); return; }
    if (act === "manage") { modal = { type: "vehicleManage" }; render(); return; }
    if (act === "select-vehicle") { activeVehicleId = t.dataset.id; closeModal(); return; }
    if (act === "add-entry") { modal = { type: "entry", entry: { _type: "fuel", _date: new Date().toISOString().slice(0,10), _fullTank: true } }; render(); return; }
    if (act === "edit-entry") {
      const en = entries.find((x) => x.id === t.dataset.id);
      modal = { type: "entry", entry: { id: en.id, _type: en.type, _date: en.date, _odometer: en.odometer ?? "", _liters: en.liters ?? "", _cost: en.cost ?? "", _note: en.note || "", _fullTank: en.fullTank !== false } };
      render(); return;
    }
    if (act === "set-entry-type") { modal.entry._type = t.dataset.type; render(); return; }
    if (act === "toggle-fulltank") { modal.entry._fullTank = !modal.entry._fullTank; render(); return; }
    if (act === "ask-delete-entry") { modal.confirmDelete = true; render(); return; }
    if (act === "cancel-delete-entry") { modal.confirmDelete = false; render(); return; }
    if (act === "confirm-delete-entry") {
      await persistEntries(entries.filter((x) => x.id !== modal.entry.id));
      closeModal(); return;
    }
    if (act === "save-entry") { await saveEntryFromModal(); return; }

    if (act === "ask-delete-vehicle") { modal.confirmDeleteId = t.dataset.id; render(); return; }
    if (act === "cancel-delete-vehicle") { modal.confirmDeleteId = null; render(); return; }
    if (act === "confirm-delete-vehicle") {
      const id = t.dataset.id;
      const nextV = vehicles.filter((v) => v.id !== id);
      const nextE = entries.filter((e) => e.vehicleId !== id);
      await persistVehicles(nextV);
      await persistEntries(nextE);
      if (activeVehicleId === id) activeVehicleId = nextV[0]?.id ?? null;
      modal.confirmDeleteId = null; render(); return;
    }
    if (act === "add-vehicle") {
      const nameEl = document.getElementById("new-vehicle-name");
      const name = nameEl.value.trim();
      if (!name) return;
      const next = [...vehicles, { id: uid(), name, color: VEHICLE_COLORS[vehicles.length % VEHICLE_COLORS.length] }];
      await persistVehicles(next);
      activeVehicleId = next[next.length - 1].id;
      render(); return;
    }
    if (act === "save-api-url") {
      const url = document.getElementById("edit-api-url").value.trim();
      if (url) { API_URL = url; localStorage.setItem("milepost_api_url", API_URL); location.reload(); }
      return;
    }
    if (act === "save-setup") {
      const url = document.getElementById("setup-url").value.trim();
      if (!url) return;
      API_URL = url; localStorage.setItem("milepost_api_url", API_URL);
      loading = true; render();
      await init(); return;
    }

    if (act === "export") { doExport(); return; }
    if (act === "import") { modal = { type: "import", rows: null, text: "" }; render(); return; }
    if (act === "preview-import") {
      const text = document.getElementById("import-text").value;
      modal.text = text;
      const rows = parseDelimited(text);
      modal.rows = rows;
      modal.status = rows.length === 0 ? "No valid rows found — check the data has Vehicle, Date, and Cost columns." : null;
      render(); return;
    }
    if (act === "confirm-import") {
      if (!modal.rows || modal.rows.length === 0) return;
      modal.importing = true; render();
      const count = await importRows(modal.rows);
      modal.importing = false;
      modal.status = `Imported ${count} entries.`;
      render();
      setTimeout(closeModal, 900);
      return;
    }
  };

  app.oninput = (e) => {
    if (e.target.id === "import-text") { modal.text = e.target.value; }
  };

  const fileInput = document.getElementById("import-file");
  if (fileInput) {
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        modal.text = reader.result;
        modal.rows = parseDelimited(reader.result);
        modal.status = null;
        render();
      };
      reader.readAsText(file);
    };
  }
}

async function saveEntryFromModal() {
  const en = modal.entry;
  const type = en._type;
  const date = document.getElementById("entry-date").value;
  const odometer = document.getElementById("entry-odo").value;
  const cost = document.getElementById("entry-cost").value;
  const liters = type === "fuel" ? document.getElementById("entry-liters").value : "";
  const note = type !== "fuel" ? document.getElementById("entry-note").value : "";
  if (!date || !cost) return;
  saving = true; render();
  const entry = {
    id: en.id || uid(),
    vehicleId: activeVehicleId,
    type, date,
    odometer: odometer === "" ? undefined : parseFloat(odometer),
    liters: type === "fuel" ? (liters === "" ? undefined : parseFloat(liters)) : undefined,
    cost: parseFloat(cost),
    fullTank: type === "fuel" ? en._fullTank : undefined,
    note: type !== "fuel" ? note : undefined,
  };
  const next = en.id ? entries.map((x) => (x.id === en.id ? entry : x)) : [...entries, entry];
  await persistEntries(next);
  saving = false;
  closeModal();
}

async function importRows(rows) {
  let nextVehicles = [...vehicles];
  const findOrCreate = (name) => {
    let v = nextVehicles.find((x) => x.name.toLowerCase() === name.toLowerCase());
    if (!v) { v = { id: uid(), name, color: VEHICLE_COLORS[nextVehicles.length % VEHICLE_COLORS.length] }; nextVehicles = [...nextVehicles, v]; }
    return v;
  };
  const newEntries = rows.map((r) => ({
    id: uid(), vehicleId: findOrCreate(r.vehicleName).id, type: r.type, date: normalizeDate(r.date),
    odometer: r.odometer, liters: r.type === "fuel" ? r.liters : undefined, cost: r.cost,
    fullTank: r.type === "fuel" ? r.fullTank : undefined, note: r.type !== "fuel" ? r.note : undefined,
  }));
  if (nextVehicles.length !== vehicles.length) await persistVehicles(nextVehicles);
  await persistEntries([...entries, ...newEntries]);
  return newEntries.length;
}

function doExport() {
  if (entries.length === 0) { errorMsg = "No entries to export yet."; render(); return; }
  const vname = (id) => vehicles.find((v) => v.id === id)?.name || "";
  const header = ["Vehicle","Date","Type","Odometer","Liters","Cost","Full Tank","Note"];
  const escc = (v) => { const s = v === undefined || v === null ? "" : String(v); return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; };
  const rows = [...entries].sort((a,b) => new Date(a.date) - new Date(b.date)).map((e) => [
    vname(e.vehicleId), e.date, TYPE_META[e.type]?.label || e.type, e.odometer ?? "", e.liters ?? "", e.cost ?? "",
    e.type === "fuel" ? (e.fullTank === false ? "No" : "Yes") : "", e.note ?? "",
  ]);
  const csv = [header, ...rows].map((r) => r.map(escc).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `milepost-export-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function closeModal() { modal = null; render(); }

init();
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
